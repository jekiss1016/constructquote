name: Daily Database Backup

on:
  schedule:
    # 5 AM UTC (corresponds to 10 PM PDT or 9 PM PST)
    - cron: '0 5 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up PostgreSQL Client
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-client

    - name: Dump Database and Compress
      env:
        SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      run: |
        # Generate a timestamp for the backup filename
        TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
        BACKUP_FILE="backup_${TIMESTAMP}.sql.gz"
        
        echo "Creating database dump and compressing to ${BACKUP_FILE}..."
        # Run pg_dump and pipe output directly to gzip
        pg_dump "$SUPABASE_DB_URL" | gzip > "$BACKUP_FILE"
        
        echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_ENV

    - name: Upload to Cloudflare R2
      env:
        R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      run: |
        echo "Uploading ${BACKUP_FILE} to Cloudflare R2 bucket ${R2_BUCKET_NAME}..."
        
        # Configure AWS CLI credentials and default region (required by AWS CLI)
        export AWS_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}"
        export AWS_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}"
        export AWS_DEFAULT_REGION="auto"
        
        # Use aws s3 cp with the Cloudflare R2 endpoint
        aws s3 cp "${BACKUP_FILE}" "s3://${R2_BUCKET_NAME}/" \
          --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
